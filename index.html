<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vélocité</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: #F2EFE9;
    color: #2A2820;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
  }

  main {
    max-width: 520px;
    width: 100%;
  }

  .eyebrow {
    font-family: 'Jost', sans-serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #9A9490;
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(3rem, 8vw, 4.2rem);
    color: #2A2820;
    letter-spacing: 0.04em;
    line-height: 1;
    margin-bottom: 22px;
  }

  .rule {
    width: 32px;
    height: 1px;
    background: #C4B89A;
    margin-bottom: 22px;
  }

  .tagline {
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1.45rem, 4vw, 2rem);
    color: #2A2820;
    line-height: 1.35;
    margin-bottom: 32px;
  }

  .status {
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #2A2820;
    margin-bottom: 6px;
  }

  .tags {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: #9A9490;
    letter-spacing: 0.1em;
    margin-bottom: 28px;
  }

  a {
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: #2A2820;
    text-decoration: underline;
    text-underline-offset: 3px;
    letter-spacing: 0.06em;
  }

  a:hover { color: #6B6660; }
</style>
</head>
<body>
<main>

  <p class="eyebrow">Stéphane Gérin-Lajoie</p>

  <h1>Vélocité</h1>

  <div class="rule"></div>

  <p class="tagline">
    Cessez de réagir —<br>
    et devenez l'origine de vos<br>
    dynamiques relationnelles.
  </p>

  <p class="status">L'offre Vélocité est en construction.</p>
  <p class="tags">Places limitées · Sur invitation · Lancement bientôt.</p>

  <a href="https://www.linkedin.com/in/stephanegerinlajoie/" target="_blank" rel="noopener noreferrer">
    → Suivre Stéphane Gérin-Lajoie sur LinkedIn
  </a>

</main>
</body>
</html>
